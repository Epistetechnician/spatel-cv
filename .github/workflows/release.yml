name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.archive }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive: spatel-linux-amd64.tar.gz
            binary: spatel
          - os: macos-13
            target: x86_64-apple-darwin
            archive: spatel-macos-amd64.tar.gz
            binary: spatel
          - os: macos-14
            target: aarch64-apple-darwin
            archive: spatel-macos-arm64.tar.gz
            binary: spatel

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux musl tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --locked --release --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "dist/${{ matrix.binary }}"
          tar -czf "${{ matrix.archive }}" -C dist "${{ matrix.binary }}"

      - name: Upload release archive
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.archive }}
